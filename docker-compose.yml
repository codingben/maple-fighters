version: '3.8'

services:
    frontend:
        image: frontend
        build:
            context: ./src/frontend
            dockerfile: Dockerfile
        environment:
            REACT_APP_ENV: Development
            REMOVE_CF_IPS: "true"
        ports:
            - 443:443
        depends_on:
            - game-service
    game-service:
        image: game-service
        build:
            context: ./src/game-service/Game.Application
        restart: "on-failure"
        expose:
            - 50051
        environment:
            URL: wss://0.0.0.0:50051
            FLECK_LOG: Info
            IM_LOG: Debug
            GAME_LOG: Debug
            CONFIG_SOURCE: v2.0
            MAX_CONNECTIONS: 100
            CERTIFICATE_NAME: "server.pfx"
            CERTIFICATE_PASSWORD: "helloworld"
